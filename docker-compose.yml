version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_pass
      POSTGRES_DB: webhooks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://webhook_user:webhook_pass@db:5432/webhooks
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      - db

volumes:
  postgres_data:
